<div *ngIf="item() as i">
  <h2>{{ i.name }}</h2>
  <img [src]="i.image" alt="{{ i.name }}" />
  <p>{{ i.description }}</p>
  <p>Category: {{ i.category }}</p>
  <p>Price: {{ i.price }}</p>
  <p>Rating: {{ i.rating }}</p>
  <button (click)="back()">Back</button>
</div>

<div *ngIf="!item() && !loading()">Item not found.</div>
<div *ngIf="loading()">Loading...</div>
